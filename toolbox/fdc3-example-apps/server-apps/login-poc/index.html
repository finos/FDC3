<html lang="en">
  <head>
    <title>Login POC</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/login-poc.ts"></script>
    <link rel="stylesheet" href="/security-demo-styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>🔐 Login POC</h1>
        <h2>FDC3 Security Demo — GetUser Client</h2>
      </div>

      <div class="status-bar">
        <div class="status-indicator status-connecting" id="status">
          <span class="status-dot">●</span>
          Connecting...
        </div>
      </div>

      <div class="action-bar">
        <button class="action-btn" id="login-btn">🔐 Login (GetUser)</button>
        <button class="action-btn" id="session-status-btn">🔍 Check Session Status</button>
        <button class="action-btn" id="logout-btn">🚪 Logout</button>
      </div>

      <div id="user-info" style="display: none; margin-top: 15px">
        <p style="color: white; font-weight: 600">
          Logged in as: <span id="user-name">user</span>
        </p>
      </div>

      <div class="log-container">
        <div class="log-header">
          <h2 class="log-title">Activity Log</h2>
          <button class="clear-btn" onclick="clearLog()">Clear Log</button>
        </div>
        <div class="log-content" id="log"></div>
      </div>
    </div>

    <script>
      function clearLog() {
        const log = document.getElementById("log")
        log.innerHTML =
          '<div class="log-entry info"><div class="log-timestamp">' +
          new Date().toLocaleTimeString() +
          '</div><div class="log-message">Log cleared</div></div>'
      }
    </script>
  </body>
</html>
