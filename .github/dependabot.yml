version: 2

updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    # Use cooldown to align with min-release-age in .npmrc — skip versions
    # published fewer than 7 days ago, giving time for malicious packages to
    # be detected and removed before they reach this repo.
    cooldown:
      default-days: 7
      semver-major-days: 10
    # Group minor and patch updates into a single PR to reduce noise.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # npm dependencies — website (separate lock file, not in workspaces)
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    # Group all actions updates into a single PR.
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
